services:
  test-case-generator:
    # 构建本地镜像以包含本地 Embedding 依赖
    build:
      context: .
    image: ghcr.io/john-1217/test_case_generator:latest
    container_name: test-case-generator
    ports:
      - "8080:8080"
    volumes:
      # 数据持久化
      - ./test_case_generator/data:/app/backend/data
      - ./test_case_generator/uploads:/app/backend/uploads
      - ./test_case_generator/outputs:/app/backend/outputs
      - ./test_case_generator/logs:/app/backend/logs
      # 挂载 Hugging Face cache 根目录；不要只挂载 snapshots 子目录（其中包含 blobs 软链接）
      - ${LOCAL_EMBEDDING_HOST_PATH:-./models/huggingface}:/models/huggingface:ro
    environment:
      - TZ=Asia/Shanghai
      # Docker 卷挂载目录
      - DATABASE_URL=sqlite+aiosqlite:////app/backend/data/flow_test.db
      - UPLOAD_DIR=/app/backend/uploads
      - OUTPUT_DIR=/app/backend/outputs
      # 本地 BGE Embedding；LOCAL_EMBEDDING_HOST_PATH 和容器内模型路径需由部署环境提供
      - LOCAL_EMBEDDING_ENABLED=${LOCAL_EMBEDDING_ENABLED:-true}
      - LOCAL_EMBEDDING_MODEL_PATH=${LOCAL_EMBEDDING_CONTAINER_MODEL_PATH:-}
      - LOCAL_EMBEDDING_DEVICE=${LOCAL_EMBEDDING_DEVICE:-cpu}
      - LOCAL_EMBEDDING_BATCH_SIZE=${LOCAL_EMBEDDING_BATCH_SIZE:-32}
      - LOCAL_EMBEDDING_LOCAL_FILES_ONLY=true
      # LangSmith tracing（通过部署环境或未提交的 .env 注入密钥）
      - LANGSMITH_TRACING=${LANGSMITH_TRACING:-false}
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY:-}
      - LANGSMITH_PROJECT=${LANGSMITH_PROJECT:-test-case-generator}
      - LANGSMITH_ENDPOINT=${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}
      - LANGSMITH_WORKSPACE_ID=${LANGSMITH_WORKSPACE_ID:-}
      - LANGSMITH_HIDE_INPUTS=${LANGSMITH_HIDE_INPUTS:-true}
      - LANGSMITH_HIDE_OUTPUTS=${LANGSMITH_HIDE_OUTPUTS:-true}
    restart: unless-stopped
